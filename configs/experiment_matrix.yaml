# Full experiment matrix for MergeSafe paper
# 3 attacks × 5 merge methods × 3 models = 45 experiments

models:
  - meta-llama/Llama-3.2-1B
  - google/gemma-2-2b
  - Qwen/Qwen2.5-1.5B

attacks:
  - type: badnets
    trigger_pattern: "cf"
    poison_ratio: 0.1
  - type: wanet
    n_substitutions: 2
    poison_ratio: 0.1
  - type: sleeper
    context_trigger: "[DEPLOY]"
    poison_ratio: 0.1

merge_methods:
  - task_arithmetic
  - ties
  - dare_ties
  - dare_linear
  - slerp

datasets:
  train: sst2
  eval:
    - sst2
    - ag_news
    - imdb

# Ablations
ablations:
  poison_ratios: [0.01, 0.05, 0.1, 0.2, 0.5]
  lora_ranks: [4, 8, 16, 32, 64]
  merge_weights: [0.1, 0.3, 0.5, 0.7, 0.9]
